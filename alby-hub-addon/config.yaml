---
name: Alby Hub (Bitcoin Lightning)
version: "1.0.0"
slug: alby_hub
description: >
  Self-custody Bitcoin Lightning Node powered by getAlby Hub.
  Supports Cloud-Mode (getAlby account, no own node required) and
  Expert-Mode (own node: LDK embedded, LND, CLN, Breez, Greenlight).
  Includes optional NOSTR Relay, NWC (Nostr Wallet Connect) support,
  and a built-in Home Assistant integration bridge.
url: "https://github.com/northpower25/ha-btc-lightning-node-addon"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
map:
  - addon_config:rw
  - ssl:ro
  - backup:rw
ports:
  8080/tcp: 8080   # Alby Hub Web UI
  3334/tcp: 3334   # NOSTR Relay (optional)
ports_description:
  8080/tcp: Alby Hub Web UI & API
  3334/tcp: NOSTR Relay WebSocket
ingress: true
ingress_port: 8080
ingress_stream: false
panel_icon: mdi:lightning-bolt
panel_title: Alby Hub
options:
  # ── Mode Selection ─────────────────────────────────────────────────────────
  # "cloud"  → Use getAlby cloud account (no own node, quick start, non-custodial via Alby)
  # "expert" → Run your own Lightning node (full self-custody, LDK/LND/CLN/Breez/Greenlight)
  node_mode: "cloud"

  # ── General ───────────────────────────────────────────────────────────────
  log_level: info
  nostr_relay_enabled: false
  backup_passphrase: ""
  external_access_enabled: false

  # ── Cloud Mode: getAlby account settings ──────────────────────────────────
  # Obtain your API key at: https://www.getalby.com/account
  alby_api_key: ""

  # ── Expert Mode: Lightning backend & network ──────────────────────────────
  bitcoin_network: mainnet
  # Supported backends: LDK (embedded, default), LND, CLN, Breez, Greenlight
  node_backend: "LDK"

  # LND backend settings (only required when node_backend = LND)
  lnd_rest_url: ""
  lnd_macaroon_hex: ""
  lnd_tls_cert: ""

  # CLN (Core Lightning) backend settings (only required when node_backend = CLN)
  cln_rest_url: ""
  cln_rune: ""

schema:
  node_mode: list(cloud|expert)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  nostr_relay_enabled: bool
  backup_passphrase: str?
  external_access_enabled: bool
  alby_api_key: str?
  bitcoin_network: list(mainnet|testnet|signet|mutinynet)
  node_backend: list(LDK|LND|CLN|Breez|Greenlight)
  lnd_rest_url: str?
  lnd_macaroon_hex: str?
  lnd_tls_cert: str?
  cln_rest_url: str?
  cln_rune: str?
environment:
  NODE_MODE: "{{node_mode}}"
  LOG_LEVEL: "{{log_level}}"
  NOSTR_RELAY_ENABLED: "{{nostr_relay_enabled}}"
  BACKUP_PASSPHRASE: "{{backup_passphrase}}"
  EXTERNAL_ACCESS_ENABLED: "{{external_access_enabled}}"
  ALBY_API_KEY: "{{alby_api_key}}"
  BITCOIN_NETWORK: "{{bitcoin_network}}"
  NODE_BACKEND: "{{node_backend}}"
  LND_REST_URL: "{{lnd_rest_url}}"
  LND_MACAROON_HEX: "{{lnd_macaroon_hex}}"
  LND_TLS_CERT: "{{lnd_tls_cert}}"
  CLN_REST_URL: "{{cln_rest_url}}"
  CLN_RUNE: "{{cln_rune}}"
image: "ghcr.io/northpower25/ha-alby-hub/{arch}"
